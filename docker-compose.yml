version: "3.9"

services:
  db:
    image: postgres:15
    container_name: my_postgres_db
    restart: always

    environment: 
      POSTGRES_USER: ${DB_USER}      
      POSTGRES_PASSWORD: ${DB_PASS}  
      POSTGRES_DB: ${DB_NAME}          

    ports:
      - "5432:5432" 

    volumes:
      - postgres_data:/var/lib/postgresql/data  
  
  redis:
    image: redis:7
    container_name: my_redis
    restart: always
    ports:
      - "6379:6379"
    
  api:
    build: .
    container_name: my_fastapi_app 
    restart: always
    ports:
      - "8080:8000"  
    env_file:
      - .env.prod  
    depends_on:
      - db  
    volumes:
      - .:/app 
    command: >
      sh /app/app/scripts/start-docker-compose.sh
    
volumes:
  postgres_data:  